name: Build and Deploy to Firebase

# runs when you push to dev or main only
on:
  push:
    branches:
      - dev
      - main

# if you push twice quickly, cancel the old run and only keep the new one
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# permissions this robot needs to read code, auth with firebase, and post deploy status
permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  # ── JOB 1: build the React app ──────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      # download your code onto the blank computer
      - name: Checkout code
        uses: actions/checkout@v4

      # install Node.js 20 — cache saves node_modules so next run is faster
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # load Appwrite credentials from GitHub Variables and build the app
      # APPWRITE_CONFIG is a JSON string stored in: repo → Settings → Variables
      # we read each field from it and export as VITE_ env vars so Vite can use them
      - name: Load env vars and build
        env:
          APPWRITE_CONFIG: ${{ vars.APPWRITE_CONFIG }}
        run: |
          # save the JSON to a temp file so Node can read it
          echo "$APPWRITE_CONFIG" > appwrite.json

          # Core Appwrite Setup
          export VITE_APPWRITE_ENDPOINT=$(node -p "require('./appwrite.json').url")
          export VITE_APPWRITE_PROJECT_ID=$(node -p "require('./appwrite.json').projectId")
          export VITE_APPWRITE_DATABASE_ID=$(node -p "require('./appwrite.json').databaseId")

          # Collections
          export VITE_APPWRITE_PROFILE_COLLECTION_ID=$(node -p "require('./appwrite.json').profileCollectionId")
          export VITE_APPWRITE_POSTS_COLLECTION_ID=$(node -p "require('./appwrite.json').postsCollectionId")
          export VITE_APPWRITE_LIKES_COLLECTION_ID=$(node -p "require('./appwrite.json').likesCollectionId")
          export VITE_APPWRITE_COMMENTS_COLLECTION_ID=$(node -p "require('./appwrite.json').commentsCollectionId")
          export VITE_APPWRITE_FOLLOWS_COLLECTION_ID=$(node -p "require('./appwrite.json').followsCollectionId || ''")
          export VITE_APPWRITE_NOTIFICATIONS_COLLECTION_ID=$(node -p "require('./appwrite.json').notificationsCollectionId || ''")
          export VITE_APPWRITE_BOOKMARKS_COLLECTION_ID=$(node -p "require('./appwrite.json').bookmarksCollectionId")

          # Storage
          export VITE_APPWRITE_BUCKET_ID=$(node -p "require('./appwrite.json').bucketId")

          # Functions — || '' means use empty string if not set yet, so the app doesn't crash
          export VITE_APPWRITE_DELETE_ACCOUNT_FUNCTION_ID=$(node -p "require('./appwrite.json').deleteAccountFunctionId || ''")

          # install packages and build — Vite bakes all VITE_ vars into the dist/ output
          npm ci
          npm run build

      # safety check — stop here if dist/ wasn't produced
      - name: Verify dist/ exists
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: build failed, dist/ not found"
            exit 1
          fi
          du -sh dist

      # upload dist/ to GitHub's temporary storage so the deploy job can access it
      # (build and deploy run on separate computers so we need to pass files like this)
      - name: Upload dist/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3 # GitHub auto-deletes after 3 days

  # ── JOB 2: deploy to Firebase ───────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build # only runs if build job succeeded

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # download the dist/ folder that was saved by the build job
      - name: Download dist/ artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── MAIN → PRODUCTION ─────────────────────────────
      - name: Deploy to Firebase (PROD)
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          target: prod
          channelId: live

      # ── DEV → DEV SITE (STABLE URL) ───────────────────
      - name: Deploy to Firebase (DEV)
        if: github.ref == 'refs/heads/dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          target: dev
          channelId: live
